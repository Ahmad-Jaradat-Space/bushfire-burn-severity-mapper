name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.4.10
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core deps
        run: |
          pip install -U pip
          # Core data deps via pyproject (no [dl] extras for CI speed)
          pip install -e ".[dev]"
      - name: pytest (excluding deep models)
        env:
          # Used by some MPS-aware code paths; CPU on CI ignores it.
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
        run: |
          pytest -q --ignore=tests/test_deep_models.py

  smoke-deep:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install full deps
        run: |
          pip install -U pip
          pip install -e ".[dev,dl]"
      - name: Forward-pass tests for U-Net + SegFormer
        env:
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
          HF_HUB_DOWNLOAD_TIMEOUT: "60"
        run: |
          pytest -q tests/test_deep_models.py tests/test_cli_overrides.py

  smoke-training:
    runs-on: ubuntu-latest
    needs: smoke-deep
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install full deps
        run: |
          pip install -U pip
          pip install -e ".[dev,dl]"
      - name: Build synthetic fixture tiles
        run: python scripts/make_fixture_tiles.py
      - name: U-Net --fast-mode smoke train on fixture tiles
        env:
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
        run: |
          python -m src.models.train_unet --config configs/experiments/smoke_unet.yaml --fast-mode
      - name: Regenerate README demo assets
        run: python -m src.viz.demo_assets --force-synthetic
      - name: Render comparison overview
        run: python -m src.viz.readme_panels --mode overview
